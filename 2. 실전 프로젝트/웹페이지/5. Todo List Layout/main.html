<!-- (필수)파일 자체의 이름 및 폴더의 기본 경로.-->
<!DOCTYPE html>
<html lang="ko">
<!--로그인 창 및 버튼-->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/background.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/clock.css">
    <link rel="stylesheet" href="css/calender.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/todolist.css">
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.20/index.global.min.js'></script>
    <title>SW비전공자 국진맨_웹페이지</title>
</head>

<!--검색 창 구현-->

<body>
    <form id="loginform">
        <input required type="text" placeholder="what is your name?" />
        <button type="submit">Login</button>
    </form><!--input, button을 다 묶어서 처리.input과 button을 보호해주는 역할.-->

    <h1 id="greeting"></h1>
    <h2 id="clock">00:00:00</h2><!--시계 기본 키워드-->
    <!--<div id="calendar"></div> clock 다음에 표기할 예정.-->

    <!--TODOLIST-->
    <div id="container">
        <div id='calendar'></div>
        <div id='todo_container'>
            <p id="cur_date">일정</p>
            <form id="todoform">
                <input required type="text" placeholder="Write a Todo" />
            </form>
            <ul id="todolist"></ul>
        </div>
    </div>
    <script src="js/login.js"></script>
    <script src="js/background.js"></script><!--파일을 가져와서 사용하게 함.-->
    <script src="js/clock.js"></script>
    <script src="js/calender.js"></script>
    <script src="js/Todolist.js"></script>
    <script src="js/test.js"></script>
</body>

</html>
